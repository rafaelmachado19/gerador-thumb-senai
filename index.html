<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Gerador de Thumbnails - Futuro.Digital</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 20px; }
    .controls { background: #fff; padding: 20px; margin: 0 auto 20px auto; border-radius: 8px; max-width: 600px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    canvas { border: 1px solid #ccc; width: 100%; max-width: 700px; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    input, button { margin: 8px; padding: 10px; border-radius: 4px; border: 1px solid #ddd; }
    button { background-color: #003399; color: white; cursor: pointer; font-weight: bold; border: none; }
    button:disabled { background-color: #ccc; }
    .slider-group { margin: 15px 0; display: none; background: #f9f9f9; padding: 15px; border-radius: 8px; }
    .slider-item { margin-bottom: 15px; }
    label { font-size: 14px; font-weight: bold; color: #333; }
  </style>
</head>
<body>

  <h1>Gerador de Cards (1400x1050)</h1>

  <div class="controls">
    <label>1. Imagem do curso:</label><br>
    <input type="file" id="userImage" accept="image/*" /><br>
    
    <div id="sliderArea" class="slider-group">
      <div class="slider-item">
        <label for="xSlider">Ajuste Lateral (Esquerda/Direita):</label><br>
        <input type="range" id="xSlider" min="0" max="100" value="50" style="width: 80%;">
      </div>
      <div class="slider-item">
        <label for="ySlider">Ajuste Vertical (Cima/Baixo):</label><br>
        <input type="range" id="ySlider" min="0" max="100" value="50" style="width: 80%;">
      </div>
    </div>

    <button id="downloadBtn" disabled>2. Baixar Imagem Final</button>
  </div>

  <canvas id="canvas" width="1400" height="1050"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('downloadBtn');
    const xSlider = document.getElementById('xSlider');
    const ySlider = document.getElementById('ySlider');
    const sliderArea = document.getElementById('sliderArea');

    let fotoDoCurso = new Image();
    let artePadrao = new Image();
    let fotoDoCursoLoaded = false;
    let artePadraoLoaded = false;

    artePadrao.src = 'arte_padrao_branca.png'; 
    artePadrao.onload = () => { artePadraoLoaded = true; if (fotoDoCursoLoaded) tryRender(); };

    [xSlider, ySlider].forEach(s => s.addEventListener('input', tryRender));

    function tryRender() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (!fotoDoCursoLoaded) return;

      const scale = Math.max(canvas.width / fotoDoCurso.width, canvas.height / fotoDoCurso.height);
      const w = fotoDoCurso.width * scale;
      const h = fotoDoCurso.height * scale;
      
      // Cálculo do deslocamento baseado nos sliders (0 a 100%)
      const xOffset = (canvas.width - w) * (xSlider.value / 100);
      const yOffset = (canvas.height - h) * (ySlider.value / 100);
      
      ctx.drawImage(fotoDoCurso, xOffset, yOffset, w, h);

      if (artePadraoLoaded) {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.drawImage(artePadrao, 0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'source-over'; 
      }
      downloadBtn.disabled = false;
    }

    document.getElementById('userImage').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (evt) => {
        fotoDoCurso.src = evt.target.result;
        fotoDoCurso.onload = () => {
          fotoDoCursoLoaded = true;
          sliderArea.style.display = 'block';
          // Reseta para o centro (50) ao carregar nova foto
          xSlider.value = 50;
          ySlider.value = 50;
          tryRender();
        };
      };
      reader.readAsDataURL(file);
    });

    downloadBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'thumbnail_senai_final.png';
      link.href = canvas.toDataURL('image/png', 1.0);
      link.click();
    });
  </script>
</body>
</html>
